<div class="overlay" id="overlay2">
  <div class="modal" id="contactModal">
    <button class="modal-close" id="closeContactBtn">×</button>
    <div class="modal-inner">
      <div class="modal-title">Оформлення замовлення</div>
      <div id="orderForm">
        <div class="form-group">
          <label class="form-label">Ім'я <span class="req">*</span></label>
          <input
            class="form-input"
            id="nameInput"
            type="text"
            placeholder="Вікторія"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Телефон <span class="req">*</span></label>
          <input
            class="form-input"
            id="phoneInput"
            type="tel"
            placeholder="38 0__ ___-__-__"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Коментар <span class="req">*</span></label>
          <textarea
            class="form-textarea"
            id="commentInput"
            placeholder="Ваш коментар"
          ></textarea>
        </div>
        <button class="btn-submit" id="submitOrderBtn">Надіслати заявку</button>
      </div>
      <div class="success-msg" id="successMsg" style="display: none">
        <div class="icon">🎉</div>
        <h3>Заявку надіслано!</h3>
        <p>Ми зателефонуємо вам найближчим часом.</p>
      </div>
    </div>
  </div>
</div>
